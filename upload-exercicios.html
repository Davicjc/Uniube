<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitAI – Upload de Exercícios</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0a0a0f;--surf:#12121a;--surf2:#1a1a26;--brd:#2a2a3a;--green:#00ff88;--gdim:#00cc6a;--text:#e8e8f0;--muted:#888899;--red:#ff4455;--warn:#ffd600;--blue:#4488ff}
    body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;padding:20px 16px 60px;min-height:100vh}
    h1{font-size:24px;color:var(--green);margin-bottom:4px}
    .subtitle{color:var(--muted);font-size:13px;margin-bottom:20px}

    .auth-bar{display:inline-flex;align-items:center;gap:8px;background:var(--surf);border:1px solid var(--brd);border-radius:8px;padding:7px 14px;margin-bottom:20px;font-size:13px}
    .auth-dot{width:9px;height:9px;border-radius:50%;background:var(--warn);flex-shrink:0}

    .toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:16px}
    .sel-count{color:var(--muted);font-size:13px;margin-left:auto}
    button{border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;padding:9px 16px;transition:opacity .15s,transform .1s}
    button:hover{opacity:.88}
    button:active{transform:scale(.97)}
    button:disabled{opacity:.35;cursor:not-allowed;transform:none}
    .btn-green{background:var(--green);color:#000}
    .btn-dim{background:var(--surf2);color:var(--text);border:1px solid var(--brd)}
    .btn-red{background:var(--red);color:#fff}

    .filter-tabs{display:flex;gap:8px;margin-bottom:16px}
    .filter-tab{background:var(--surf);border:1px solid var(--brd);border-radius:20px;color:var(--muted);padding:6px 16px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
    .filter-tab.active{border-color:var(--green);color:var(--green);background:rgba(0,255,136,.08)}

    .prog-wrap{background:var(--surf2);border-radius:6px;height:7px;overflow:hidden;margin-bottom:6px;display:none}
    .prog-fill{height:100%;background:var(--green);width:0%;transition:width .3s}
    .prog-text{font-size:12px;color:var(--muted);min-height:16px}

    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px;margin-top:12px}
    .card{background:var(--surf);border:1px solid var(--brd);border-radius:12px;padding:12px 14px;cursor:pointer;transition:border-color .15s,background .15s;user-select:none;position:relative}
    .card:hover{border-color:#444460}
    .card.selected{border-color:var(--green);background:rgba(0,255,136,.06)}
    .card.done{border-color:var(--gdim);background:rgba(0,204,106,.1);pointer-events:none}
    .card.done::after{content:'✓';position:absolute;top:9px;right:12px;color:var(--green);font-size:17px;font-weight:700}
    .card.error{border-color:var(--red);background:rgba(255,68,85,.08)}
    .card-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
    .card-name{font-size:14px;font-weight:700;flex:1}
    .loc-chip{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap}
    .loc-home{background:rgba(0,255,136,.15);color:var(--green)}
    .loc-gym {background:rgba(68,136,255,.15);color:var(--blue)}
    .card-cat{font-size:11px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
    .angles{display:flex;flex-wrap:wrap;gap:3px}
    .ac{background:var(--surf2);border:1px solid var(--brd);border-radius:4px;font-size:10px;padding:1px 5px;color:var(--muted);font-family:monospace}
    .ac span{color:var(--green);font-weight:700}

    .log{margin-top:20px;background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:12px;max-height:180px;overflow-y:auto;font-family:monospace;font-size:12px;color:var(--muted)}
    .lok{color:var(--green)}.lerr{color:var(--red)}.linf{color:var(--warn)}
  </style>
</head>

<h1>Upload de Exercícios — FitAI</h1>
<p class="subtitle">🏠 Casa = só corpo, zero equipamento &nbsp;·&nbsp; 🏋️ Academia = requer equipamento (halteres, barra, máquinas)</p>

<div class="auth-bar">
  <span class="auth-dot" id="auth-dot"></span>
  <span id="auth-label">Conectando…</span>
</div>

<div class="toolbar">
  <button class="btn-red"   id="btn-clear-upload">🗑 Limpar BD e Re-enviar Tudo</button>
  <button class="btn-green" id="btn-upload">▲ Enviar Selecionados</button>
  <button class="btn-dim"   id="btn-all">Todos</button>
  <button class="btn-dim"   id="btn-none">Nenhum</button>
  <span class="sel-count" id="sel-count">0 selecionados</span>
</div>

<div class="filter-tabs">
  <div class="filter-tab active" data-loc="all">Todos</div>
  <div class="filter-tab" data-loc="home">🏠 Casa</div>
  <div class="filter-tab" data-loc="gym">🏋️ Academia</div>
</div>

<div class="prog-wrap" id="prog-wrap"><div class="prog-fill" id="prog-fill"></div></div>
<div class="prog-text" id="prog-text"></div>

<div class="grid" id="grid"></div>
<div class="log" id="log"><span class="linf">Aguardando…</span></div>

// ── Auth ─────────────────────────────────────────────────────────────────────
firebase.auth().onAuthStateChanged(u => {
  const dot = document.getElementById('auth-dot');
  const lbl = document.getElementById('auth-label');
  if (u) { dot.style.background='#00ff88'; lbl.textContent=`Firebase OK – uid: ${u.uid.slice(0,8)}…`; }
  else   { dot.style.background='#ff4455'; lbl.textContent='Sem autenticação – habilite Anonymous Auth no console'; }
});

// ── State ────────────────────────────────────────────────────────────────────
let selected  = new Set();
let filterLoc = 'all';
let cardEls   = [];

const grid = document.getElementById('grid');

function angleChips(t){
  return Object.entries(t).map(([k,v])=>{
    const s=k.replace('left','L').replace('right','R').replace('Knee','Jo').replace('Hip','Qu').replace('Elbow','Co').replace('Shoulder','Om').replace('trunk','Tr');
    return `<div class="ac">${s}=<span>${Math.round(v)}°</span></div>`;
  }).join('');
}

function renderGrid(){
  grid.innerHTML='';
  cardEls=[];
  EXERCISES.forEach((ex,i)=>{
    if(filterLoc!=='all' && ex.location!==filterLoc){cardEls.push(null);return;}
    const card=document.createElement('div');
    card.className='card'+(selected.has(i)?' selected':'');
    const locLabel = ex.location==='home'
      ? '<span class="loc-chip loc-home">🏠 Casa</span>'
      : '<span class="loc-chip loc-gym">🏋️ Academia</span>';
    card.innerHTML=`
      <div class="card-top"><span class="card-name">${ex.name}</span>${locLabel}</div>
      <div class="card-cat">${ex.category}</div>
      <div class="angles">${angleChips(ex.angleTemplate)}</div>`;
    card.addEventListener('click',()=>{
      if(card.classList.contains('done'))return;
      if(selected.has(i)){selected.delete(i);card.classList.remove('selected');}
      else{selected.add(i);card.classList.add('selected');}
      document.getElementById('sel-count').textContent=`${selected.size} selecionados`;
    });
    cardEls[i]=card;
    grid.appendChild(card);
  });
}
renderGrid();

// ── Filter tabs ───────────────────────────────────────────────────────────────
document.querySelectorAll('.filter-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    filterLoc=tab.dataset.loc;
    renderGrid();
  });
});

// ── Select all / none ─────────────────────────────────────────────────────────
document.getElementById('btn-all').addEventListener('click',()=>{
  EXERCISES.forEach((_,i)=>{
    if(filterLoc==='all'||EXERCISES[i].location===filterLoc){
      if(!cardEls[i]?.classList.contains('done')){
        selected.add(i);
        cardEls[i]?.classList.add('selected');
      }
    }
  });
  document.getElementById('sel-count').textContent=`${selected.size} selecionados`;
});
document.getElementById('btn-none').addEventListener('click',()=>{
  selected.clear();
  cardEls.forEach(c=>c?.classList.remove('selected'));
  document.getElementById('sel-count').textContent='0 selecionados';
});

// ── Log ───────────────────────────────────────────────────────────────────────
const logEl=document.getElementById('log');
function addLog(msg,cls=''){
  const d=document.createElement('div');
  d.className=cls;d.textContent=msg;
  logEl.appendChild(d);logEl.scrollTop=logEl.scrollHeight;
}

// ── Upload ────────────────────────────────────────────────────────────────────
async function doUpload(indices){
  const cfg=window.FitAIConfig;
  if(!cfg?.saveCustomExercise){addLog('Firebase não inicializado.','lerr');return;}
  const wrap=document.getElementById('prog-wrap');
  const fill=document.getElementById('prog-fill');
  const ptxt=document.getElementById('prog-text');
  wrap.style.display='block';
  document.getElementById('btn-upload').disabled=true;
  document.getElementById('btn-clear-upload').disabled=true;

  let done=0,errors=0;
  for(const i of indices){
    const ex=EXERCISES[i];
    const payload={
      name:        ex.name,
      category:    ex.category,
      location:    ex.location,
      angleTemplate: ex.angleTemplate,
      signature:   Object.values(ex.angleTemplate).map(v=>Math.round(v)).join('-'),
      frameCount:  120,
      createdAt:   new Date().toISOString()
    };
    try{
      await cfg.saveCustomExercise(payload);
      done++;
      if(cardEls[i]){cardEls[i].classList.remove('selected');cardEls[i].classList.add('done');}
      selected.delete(i);
      addLog(`✓ [${ex.location==='home'?'🏠':'🏋️'}] ${ex.name}`,'lok');
    }catch(e){
      errors++;
      cardEls[i]?.classList.add('error');
      addLog(`✗ ${ex.name}: ${e.message}`,'lerr');
    }
    const pct=Math.round(((done+errors)/indices.length)*100);
    fill.style.width=pct+'%';
    ptxt.textContent=`${done+errors}/${indices.length} – ${pct}%`;
    await new Promise(r=>setTimeout(r,80));
  }
  document.getElementById('sel-count').textContent=`${selected.size} selecionados`;
  ptxt.textContent=`Concluído: ${done} enviados, ${errors} erros.`;
  addLog(`─── Fim: ${done} salvos, ${errors} erros ───`,'linf');
  document.getElementById('btn-upload').disabled=false;
  document.getElementById('btn-clear-upload').disabled=false;
}

document.getElementById('btn-upload').addEventListener('click',()=>{
  if(!selected.size){addLog('Selecione ao menos um exercício.','lerr');return;}
  doUpload(Array.from(selected));
});

// ── Limpar BD e re-enviar tudo ────────────────────────────────────────────────
document.getElementById('btn-clear-upload').addEventListener('click',async()=>{
  const total = EXERCISES.length;
  const home  = EXERCISES.filter(e=>e.location==='home').length;
  const gym   = EXERCISES.filter(e=>e.location==='gym').length;
  if(!confirm(`Apagar TODOS os exercícios do Firestore e re-enviar tudo?\n\n🏠 Casa: ${home} exercícios (corpo livre)\n🏋️ Academia: ${gym} exercícios (com equipamento)\nTotal: ${total}\n\nEssa ação é irreversível.`))return;

  addLog('Limpando coleção exercises…','linf');
  try{
    const db=firebase.firestore();
    const snap=await db.collection('exercises').get();
    if(snap.size>0){
      // Delete in batches of 400 (Firestore limit is 500)
      const chunks=[];
      for(let i=0;i<snap.docs.length;i+=400)chunks.push(snap.docs.slice(i,i+400));
      for(const chunk of chunks){
        const batch=db.batch();
        chunk.forEach(d=>batch.delete(d.ref));
        await batch.commit();
      }
      addLog(`${snap.size} documentos removidos.`,'lok');
    }else{
      addLog('Coleção já estava vazia.','linf');
    }
    cardEls.forEach(c=>{if(c)c.classList.remove('done','error','selected');});
    selected.clear();
    document.getElementById('sel-count').textContent='0 selecionados';

    addLog(`Enviando todos os ${total} exercícios…`,'linf');
    await doUpload(EXERCISES.map((_,i)=>i));
  }catch(e){
    addLog('Erro ao limpar: '+e.message,'lerr');
    addLog('Dica: pode ser permissão do Firestore. Verifique as regras ou delete manualmente no console.','linf');
  }
});
</script>
