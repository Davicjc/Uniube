  <title>FitAI – Upload em Massa de Exercícios</title>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0a0a0f;
      --surface:    #12121a;
      --surface2:   #1a1a26;
      --border:     #2a2a3a;
      --green:      #00ff88;
      --green-dim:  #00cc6a;
      --text:       #e8e8f0;
      --text-muted: #888899;
      --danger:     #ff4455;
      --warn:       #ffd600;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding: 24px 16px 60px;
    }

    h1 { font-size: 26px; color: var(--green); margin-bottom: 6px; }
    .subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 28px; }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 20px;
    }
    .toolbar span { color: var(--text-muted); font-size: 13px; margin-left: auto; }

    button {
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 18px;
      transition: opacity .15s, transform .1s;
    }
    button:hover { opacity: .88; }
    button:active { transform: scale(.97); }
    button:disabled { opacity: .35; cursor: not-allowed; transform: none; }

    .btn-green  { background: var(--green);  color: #000; }
    .btn-dimmer { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-danger { background: var(--danger);  color: #fff; }

    /* ── Progress ── */
    .progress-bar-wrap {
      background: var(--surface2);
      border-radius: 6px;
      height: 8px;
      overflow: hidden;
      margin-bottom: 8px;
      display: none;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--green);
      width: 0%;
      transition: width .3s;
    }
    .progress-text { font-size: 13px; color: var(--text-muted); min-height: 18px; }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
      margin-top: 16px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      position: relative;
      user-select: none;
    }
    .card:hover { border-color: #444460; }
    .card.selected {
      border-color: var(--green);
      background: rgba(0,255,136,.06);
    }
    .card.done {
      border-color: var(--green-dim);
      background: rgba(0,204,106,.1);
    }
    .card.done::after {
      content: '✓';
      position: absolute;
      top: 10px; right: 12px;
      color: var(--green);
      font-size: 18px;
      font-weight: 700;
    }
    .card.error {
      border-color: var(--danger);
      background: rgba(255,68,85,.08);
    }

    .card-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }
    .card-category {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .card-angles {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .angle-chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 10px;
      padding: 2px 6px;
      color: var(--text-muted);
      font-family: monospace;
    }
    .angle-chip span { color: var(--green); font-weight: 700; }

    /* ── Log ── */
    .log {
      margin-top: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      max-height: 200px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 12px;
      color: var(--text-muted);
    }
    .log-line { margin-bottom: 3px; }
    .log-ok   { color: var(--green); }
    .log-err  { color: var(--danger); }
    .log-info { color: var(--warn); }
  </style>
</head>

<p class="subtitle">Selecione os exercícios e clique em "Enviar para Firebase".</p>
<div id="auth-status" style="
  display:inline-flex; align-items:center; gap:8px;

">

<div class="toolbar">

  <button class="btn-danger" id="btn-clear-db">Limpar Coleção</button>

<div class="progress-bar-wrap" id="progress-wrap">

</div>
<div class="progress-text" id="progress-text"></div>

<div class="grid" id="grid"></div>

<div class="log" id="log"><div class="log-line log-info">Aguardando ação…</div></div>

const authDot   = document.getElementById('auth-dot');

    authLabel.textContent      = `Firebase OK — uid: ${user.uid.slice(0, 8)}…`;
  } else {
    authDot.style.background   = '#ff4455';
    authLabel.textContent      = 'Sem autenticação — habilite Anonymous Auth no console do Firebase';
  }
});

// ════════════════════════════════════════════════════════════════════════════
// UI – Render cards
// ════════════════════════════════════════════════════════════════════════════
const grid = document.getElementById('grid');
const selCount = document.getElementById('sel-count');
const log = document.getElementById('log');

let selected = new Set();
let cardEls  = [];

function angleChips(tpl) {
  return Object.entries(tpl).map(([k, v]) => {
    const short = k
      .replace('left','L').replace('right','R')
      .replace('Knee','Jo').replace('Hip','Qu')
      .replace('Elbow','Co').replace('Shoulder','Om')
      .replace('Angle','An').replace('trunk','Tr')
      .replace('Ankle','To');
    return `<div class="angle-chip">${short}=<span>${Math.round(v)}°</span></div>`;
  }).join('');
}

EXERCISES.forEach((ex, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-name">${ex.name}</div>
    <div class="card-category">${ex.category}</div>
    <div class="card-angles">${angleChips(ex.angleTemplate)}</div>
  `;
  card.addEventListener('click', () => {
    if (card.classList.contains('done')) return;
    if (selected.has(i)) { selected.delete(i); card.classList.remove('selected'); }
    else                 { selected.add(i);    card.classList.add('selected'); }
    selCount.textContent = `${selected.size} selecionados`;
  });
  cardEls.push(card);
  grid.appendChild(card);
});

document.getElementById('btn-select-all').addEventListener('click', () => {
  EXERCISES.forEach((_, i) => {
    if (!cardEls[i].classList.contains('done')) {
      selected.add(i);
      cardEls[i].classList.add('selected');
    }
  });
  selCount.textContent = `${selected.size} selecionados`;
});

document.getElementById('btn-deselect-all').addEventListener('click', () => {
  selected.clear();
  cardEls.forEach(c => c.classList.remove('selected'));
  selCount.textContent = '0 selecionados';
});

// ════════════════════════════════════════════════════════════════════════════
// LOG
// ════════════════════════════════════════════════════════════════════════════
function addLog(msg, type = '') {
  const line = document.createElement('div');
  line.className = 'log-line' + (type ? ' log-' + type : '');
  line.textContent = msg;
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
}

// ════════════════════════════════════════════════════════════════════════════
// UPLOAD
// ════════════════════════════════════════════════════════════════════════════
document.getElementById('btn-upload').addEventListener('click', async () => {
  if (selected.size === 0) { addLog('Nenhum exercício selecionado.', 'err'); return; }

  const cfg = window.FitAIConfig;
  if (!cfg || !cfg.saveCustomExercise) {
    addLog('Firebase não inicializado. Verifique config.js.', 'err');
    return;
  }

  const wrap = document.getElementById('progress-wrap');
  const fill = document.getElementById('progress-fill');
  const ptxt = document.getElementById('progress-text');

  wrap.style.display = 'block';
  const indices = Array.from(selected);
  let done = 0;
  let errors = 0;

  document.getElementById('btn-upload').disabled = true;

  for (const i of indices) {
    const ex = EXERCISES[i];
    const payload = {
      name:          ex.name,
      category:      ex.category,
      angleTemplate: ex.angleTemplate,
      signature:     Object.values(ex.angleTemplate).map(v => Math.round(v)).join('-'),
      frameCount:    120,
      createdAt:     new Date().toISOString()
    };

    try {
      await cfg.saveCustomExercise(payload);
      done++;
      cardEls[i].classList.remove('selected');
      cardEls[i].classList.add('done');
      selected.delete(i);
      addLog(`✓ ${ex.name}`, 'ok');
    } catch (err) {
      errors++;
      cardEls[i].classList.add('error');
      addLog(`✗ ${ex.name}: ${err.message}`, 'err');
    }

    const pct = Math.round(((done + errors) / indices.length) * 100);
    fill.style.width = pct + '%';
    ptxt.textContent = `${done + errors} / ${indices.length} — ${pct}%`;

    await new Promise(r => setTimeout(r, 80));
  }

  selCount.textContent = `${selected.size} selecionados`;
  ptxt.textContent = `Concluído: ${done} enviados, ${errors} erros.`;
  addLog(`─── Fim: ${done} salvos, ${errors} erros ───`, 'info');
  document.getElementById('btn-upload').disabled = false;
});

// ════════════════════════════════════════════════════════════════════════════
// LIMPAR COLEÇÃO (só Firestore, não localStorage)
// ════════════════════════════════════════════════════════════════════════════
document.getElementById('btn-clear-db').addEventListener('click', async () => {
  if (!confirm('Apagar TODOS os exercícios da coleção "exercises" no Firestore?')) return;

  addLog('Limpando coleção…', 'info');
  try {
    const db = firebase.firestore();
    const snap = await db.collection('exercises').get();
    const batch = db.batch();
    snap.docs.forEach(d => batch.delete(d.ref));
    await batch.commit();
    addLog(`${snap.size} documentos removidos.`, 'ok');
    cardEls.forEach(c => c.classList.remove('done', 'error', 'selected'));
    selected.clear();
    selCount.textContent = '0 selecionados';
  } catch (err) {
    addLog('Erro: ' + err.message, 'err');
  }
});
</script>
</body>
</html>
