  const KEYS = ['nose','lS','rS','lE','rE','lW','rW','lH','rH','lK','rK','lA','rA'];
  const REST = {
    nose:{x:.500,y:.120}, lS:{x:.600,y:.300}, rS:{x:.400,y:.300},
    lE:{x:.640,y:.460},   rE:{x:.360,y:.460},
    lW:{x:.650,y:.600},   rW:{x:.350,y:.600},
    lH:{x:.575,y:.560},   rH:{x:.425,y:.560},
    lK:{x:.575,y:.730},   rK:{x:.425,y:.730},
    lA:{x:.575,y:.890},   rA:{x:.425,y:.890}
  };

  function lerp(a,b,t){ return a+(b-a)*t; }
  function lerpPose(a,b,t){
    const out={};
    for(const k of KEYS) out[k]={
      x:Math.round(lerp(a[k].x,b[k].x,t)*1000)/1000,
      y:Math.round(lerp(a[k].y,b[k].y,t)*1000)/1000
    };
    return out;
  }
  function makeAnimFrames(peakOverrides, restOverrides={}){
    const restPose={}, peakPose={};
    for(const k of KEYS){ restPose[k]=restOverrides[k]||REST[k]; }
    for(const k of KEYS){ peakPose[k]=peakOverrides[k]||restPose[k]; }
    const frames=[], N=30;
    for(let i=0;i<N;i++){
      const t=Math.sin((i/(N-1))*Math.PI);
      frames.push(lerpPose(restPose,peakPose,t));
    }
    return frames;
  }
  function makeMotionRange(animFrames){
    const mr={};
    for(const k of KEYS){
      const xs=animFrames.map(f=>f[k]?.x).filter(v=>v!=null);
      const ys=animFrames.map(f=>f[k]?.y).filter(v=>v!=null);
      if(xs.length<2){mr[k]=0;continue;}
      mr[k]=Math.round(Math.max(Math.max(...xs)-Math.min(...xs),Math.max(...ys)-Math.min(...ys))*1000)/1000;
    }
    return mr;
  }

  // ── Build full exercise document ───────────────────────────────────────────
  function buildExercise(def, uid) {
    const animFrames  = makeAnimFrames(def.peakOverrides, def.restOverrides || {});
    const motionRange = makeMotionRange(animFrames);
    const now = new Date().toISOString();
    return {
      name:          def.name,
      angleTemplate: def.angleTemplate,
      peakAngles:    def.peakAngles,
      signature:     {},
      frameCount:    animFrames.length,
      animFrames,
      motionRange,
      createdAt:     now,
      createdBy:     uid || 'seed',
      serverTimestamp: firebase.firestore.FieldValue.serverTimestamp()
    };
  }

  // ── Delete all exercises ───────────────────────────────────────────────────
  async function deleteAllExercises() {
    log('Buscando exercícios para deletar...', 'log-info');
    const snap = await db.collection('exercises').get();
    if (snap.empty) { log('  → Coleção já está vazia.', 'log-info'); return {deleted:0,failed:0}; }
    log(`  → ${snap.size} documento(s). Deletando...`, 'log-info');
    let deleted=0, failed=0;
    for (const docSnap of snap.docs) {
      try { await docSnap.ref.delete(); deleted++; }
      catch(e) { failed++; }
    }
    return {deleted, failed};
  }

  // ── Seed ───────────────────────────────────────────────────────────────────
  async function seedExercises(uid) {
    const total = EXERCISE_DEFS.length;
    for (let i=0; i<total; i++) {
      const doc = buildExercise(EXERCISE_DEFS[i], uid);
      await db.collection('exercises').add(doc);
      log(`  ✓ [${i+1}/${total}] ${EXERCISE_DEFS[i].name}`, 'log-ok');
      setProgress(60 + ((i+1)/total)*40);
    }
  }

    try {
      const cred = await auth.signInAnonymously();
      log(`  → UID: ${cred.user.uid}`, 'log-ok');
      return cred.user.uid;
    } catch(e) {
      log(`  → Auth falhou, usando uid="seed"`, 'log-info');
      return 'seed';
    }
  }

  function disableAllBtns(state) {
    ['btnSeed','btnAddOnly','btnStatus'].forEach(id => document.getElementById(id).disabled = state);
  }

  // ── Apagar tudo + criar ────────────────────────────────────────────────────
  document.getElementById('btnSeed').addEventListener('click', async () => {
    if (!confirm(`Apagar tudo e criar ${EXERCISE_DEFS.length} exercícios?`)) return;
    disableAllBtns(true); clearLog(); setProgress(0);
    try {
      log('── Autenticando...', 'log-head');
      const uid = await doAuth(); setProgress(10);
      log('── Apagando coleção exercises...', 'log-head');
      const {deleted, failed} = await deleteAllExercises();
      log(`  → ${deleted} deletado(s)${failed>0?`, ${failed} com erro`:'.'}`,'log-ok');
      setProgress(55);
      log(`── Criando ${EXERCISE_DEFS.length} exercícios...`, 'log-head');
      await seedExercises(uid);
      setProgress(100);
      log(`\n✅ Concluído! ${EXERCISE_DEFS.length} exercícios criados.`, 'log-ok');
    } catch(err) {
      log(`❌ Erro: ${err.message}`, 'log-err');
    } finally { disableAllBtns(false); }
  });

  // ── Só adicionar ───────────────────────────────────────────────────────────
  document.getElementById('btnAddOnly').addEventListener('click', async () => {
    if (!confirm(`Adicionar ${EXERCISE_DEFS.length} exercícios sem apagar?`)) return;
    disableAllBtns(true); clearLog(); setProgress(0);
    try {
      log('── Autenticando...', 'log-head');
      const uid = await doAuth(); setProgress(10);
      log(`── Criando ${EXERCISE_DEFS.length} exercícios...`, 'log-head');
      await seedExercises(uid);
      setProgress(100);
      log(`\n✅ ${EXERCISE_DEFS.length} exercícios adicionados!`, 'log-ok');
    } catch(err) {
      log(`❌ Erro: ${err.message}`, 'log-err');
    } finally { disableAllBtns(false); }
  });

  // ── Status ─────────────────────────────────────────────────────────────────
  document.getElementById('btnStatus').addEventListener('click', async () => {
    clearLog(); setProgress(0);
    log('── Verificando banco...', 'log-head');
    try {
      await auth.signInAnonymously().catch(()=>{});
      const snap = await db.collection('exercises').get();
      log(`  → ${snap.size} exercício(s) na coleção.`, 'log-ok');
      snap.docs.forEach((d,i) => {
        const data = d.data();
        const frames = data.animFrames ? data.animFrames.length : 0;
        log(`  ${i+1}. ${data.name||'(sem nome)'} — ${frames} frames`, frames>0?'log-ok':'log-err');
      });
      setProgress(100);
    } catch(err) { log(`❌ ${err.message}`, 'log-err'); }
  });
  </script>
</body>
</html>
